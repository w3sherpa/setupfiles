services:
  # MAKE SURE TO COMMENT FOLLOW LINE IF THERE is problem in WINDOWS. THIS is strickly for linux deploy, but supposed to be harmless and independent of elastic deploy. 
  elasticsearch-init:
    image: busybox:latest
    container_name: sherpaticket_elasticsearch_init
    user: "0:0"
    command: sh -c "mkdir -p /data && chown -R 1000:0 /data && chmod -R g+rwX /data"
    volumes:
      - ./elastic_sherpaticket:/data
    networks:
      - sherpaticket_net
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: ${ELASTIC_CONTAINER_NAME}
    restart: unless-stopped

    environment:
      - node.name=${ELASTIC_NODE_NAME}
      - cluster.name=${ELASTIC_CLUSTER_NAME}
      - discovery.type=single-node

      # Enables Elasticsearch built-in users, including "elastic"
      - xpack.security.enabled=true

      # Password for the built-in "elastic" user
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}

      - ES_JAVA_OPTS=${ES_JAVA_OPTS}

    ports:
      - "${ELASTIC_HTTP_PORT}:9200"
      - "${ELASTIC_TRANSPORT_PORT}:9300"

    volumes:
      - ./elastic_sherpaticket:/usr/share/elasticsearch/data

    networks:
      - sherpaticket_net

    ulimits:
      memlock:
        soft: -1
        hard: -1

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -u ${ELASTIC_USERNAME}:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  elasticsearch_data:
    driver: local

networks:
  sherpaticket_net:
    external: true