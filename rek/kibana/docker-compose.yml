services:
  kibana:
    image: docker.elastic.co/kibana/kibana:${KIBANA_VERSION}
    container_name: ${KIBANA_CONTAINER_NAME}
    restart: unless-stopped

    environment:
      - SERVER_NAME=${KIBANA_CONTAINER_NAME}
      - SERVER_HOST=0.0.0.0

      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_HOSTS}
      - ELASTICSEARCH_USERNAME=${KIBANA_ELASTICSEARCH_USERNAME}
      - ELASTICSEARCH_PASSWORD=${KIBANA_ELASTICSEARCH_PASSWORD}

    ports:
      - "${KIBANA_PORT}:5601"

    networks:
      - sherpaticket_net

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:5601/api/status || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

networks:
  sherpaticket_net:
    external: true